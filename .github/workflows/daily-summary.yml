name: Daily Slack Summary

on:
  schedule:
    # 8:00 AM CET = 7:00 AM UTC (winter) / 6:00 AM UTC (summer CEST)
    # Using 6:00 AM UTC to cover CEST (summer time)
    - cron: '0 6 * * *'
    # 5:00 PM CET = 4:00 PM UTC (winter) / 3:00 PM UTC (summer CEST)
    # Using 3:00 PM UTC to cover CEST (summer time)
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      summary_type:
        description: 'Summary type'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  post-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Determine summary type
        id: summary-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.summary_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 12 ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            else
              echo "type=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate and post summary
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SUMMARY_TYPE: ${{ steps.summary-type.outputs.type }}
        run: python scripts/generate_summary.py
